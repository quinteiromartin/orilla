<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f2933">
  <title>Orilla Ventas</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    :root {
      --bg: #f7f2ea;
      --surface: #ffffff;
      --ink: #1f2933;
      --muted: #65717d;
      --line: #d8d1c7;
      --accent: #c85f3d;
      --ok: #18735b;
      --warn: #9a5b00;
      --danger: #a63a3a;
      --shadow: 0 10px 30px rgba(31, 41, 51, 0.10);
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    button, input, select, textarea { font: inherit; }

    .app {
      max-width: 760px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 16px 10px;
      background: rgba(247, 242, 234, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .topbar, .line-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .status {
      margin-top: 8px;
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    main {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fffdf9;
      color: var(--ink);
      font-size: 16px;
    }

    textarea {
      min-height: 68px;
      resize: vertical;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .actions button { flex: 1; }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--ink);
      color: white;
      font-weight: 750;
      cursor: pointer;
    }

    button.secondary {
      background: #e9e1d7;
      color: var(--ink);
    }

    button.accent { background: var(--accent); }
    button.danger { background: var(--danger); }

    button.linkish {
      min-height: auto;
      padding: 4px 0;
      background: transparent;
      color: var(--muted);
      text-decoration: underline;
      font-weight: 650;
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e9e1d7;
      color: var(--ink);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .pill.ok { background: #dceee8; color: var(--ok); }
    .pill.warn { background: #fff0cf; color: var(--warn); }
    .pill.danger { background: #f6dddd; color: var(--danger); }

    .line {
      display: grid;
      gap: 5px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      font-size: 14px;
    }

    .line:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .line-title { font-weight: 750; }
    .line-meta { color: var(--muted); font-size: 13px; }
    .empty { margin: 0; color: var(--muted); font-size: 14px; }

    .mini-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .mini-actions button {
      min-height: 34px;
      flex: 0 0 auto;
      padding: 7px 9px;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      max-width: 728px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      box-shadow: var(--shadow);
      font-weight: 700;
      transform: translateY(120px);
      opacity: 0;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 560px) {
      .grid2 { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .actions button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <h1>Orilla Ventas</h1>
        <span id="cartPill" class="pill">Carrito vacío</span>
      </div>
      <div class="status">
        <span id="stockStatus">Stock: sin descargar</span>
        <span id="syncStatus">Actualizando...</span>
      </div>
    </header>

    <main>
      <section>
        <h2>Agregar prenda</h2>
        <label>
          Buscar
          <input id="searchInput" type="search" autocomplete="off" placeholder="Nombre, color, talle o SKU">
        </label>
        <label>
          Producto
          <select id="productSelect"></select>
        </label>
        <div class="grid2">
          <label>
            Cantidad
            <input id="quantityInput" type="number" min="1" step="1" value="1">
          </label>
          <label>
            Precio
            <input id="priceInput" type="number" min="0" step="0.01" inputmode="decimal">
          </label>
        </div>
        <div class="actions">
          <button id="addCartButton" class="accent" type="button">Agregar al carrito</button>
          <button id="refreshButton" class="secondary" type="button">Actualizar stock</button>
        </div>
      </section>

      <section>
        <div class="line-main">
          <h2>Carrito</h2>
          <span id="cartAmount" class="pill">$0</span>
        </div>
        <div id="cartList"></div>
        <div class="grid2" style="margin-top: 12px;">
          <label>
            Medio de cobro
            <select id="paymentSelect">
              <option>Efectivo</option>
              <option>Transferencia</option>
              <option>Mercado Pago</option>
              <option>Tarjeta</option>
              <option>Otro</option>
            </select>
          </label>
          <label>
            Descuento total
            <input id="saleDiscountInput" type="number" min="0" step="0.01" inputmode="decimal" value="0">
          </label>
        </div>
        <label>
          Nota
          <textarea id="notesInput" placeholder="Opcional"></textarea>
        </label>
        <div class="actions">
          <button id="finalizeButton" class="accent" type="button">Finalizar compra</button>
          <button id="clearCartButton" class="secondary" type="button">Vaciar carrito</button>
        </div>
      </section>

      <section>
        <div class="line-main">
          <h2>Stock disponible</h2>
          <span id="productCount" class="pill ok">0</span>
        </div>
        <div id="productList"></div>
      </section>

      <section>
        <div class="line-main">
          <h2>No enviadas</h2>
          <span id="unsentPill" class="pill warn">0</span>
        </div>
        <div id="unsentList"></div>
        <div class="actions" style="margin-top: 12px;">
          <button id="retryUnsentButton" type="button">Reintentar envío</button>
        </div>
      </section>

      <section>
        <div class="line-main">
          <h2>Enviadas recientes</h2>
          <span id="sentPill" class="pill ok">0</span>
        </div>
        <div id="sentList"></div>
      </section>

      <section>
        <div class="line-main">
          <h2>GitHub</h2>
          <span id="githubStatus" class="pill warn">sin configurar</span>
        </div>
        <label>
          Token
          <input id="githubTokenInput" type="password" autocomplete="off" placeholder="Pegar token una vez">
        </label>
        <div class="grid2">
          <label>
            Repo
            <input id="githubRepoInput" type="text" autocomplete="off" value="quinteiromartin/orilla-ventas-inbox">
          </label>
          <label>
            Rama
            <input id="githubBranchInput" type="text" autocomplete="off" value="main">
          </label>
        </div>
        <label>
          Carpeta
          <input id="githubFolderInput" type="text" autocomplete="off" value="ventas">
        </label>
        <div class="actions">
          <button id="saveGithubButton" class="secondary" type="button">Guardar configuración</button>
          <button id="clearGithubButton" class="secondary" type="button">Quitar token</button>
        </div>
      </section>

      <section>
        <button id="exportBackupButton" class="linkish" type="button">Respaldo técnico: exportar ventas locales</button>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const STOCK_URL = "../exports/foto_stock.json";
    const STOCK_KEY = "orilla.latestStock";
    const CART_KEY = "orilla.cart";
    const UNSENT_KEY = "orilla.unsentSales";
    const SENT_KEY = "orilla.sentSales";
    const GITHUB_KEY = "orilla.githubConfig";
    const LEGACY_SALES_KEY = "orilla.pendingSales";

    const state = {
      stock: { version: 1, generado_en: null, ventas_mobile_importadas: [], productos: [] },
      filteredProducts: [],
      cart: [],
      unsentSales: [],
      sentSales: []
    };

    const els = {
      stockStatus: document.getElementById("stockStatus"),
      syncStatus: document.getElementById("syncStatus"),
      cartPill: document.getElementById("cartPill"),
      searchInput: document.getElementById("searchInput"),
      productSelect: document.getElementById("productSelect"),
      quantityInput: document.getElementById("quantityInput"),
      priceInput: document.getElementById("priceInput"),
      addCartButton: document.getElementById("addCartButton"),
      refreshButton: document.getElementById("refreshButton"),
      cartAmount: document.getElementById("cartAmount"),
      cartList: document.getElementById("cartList"),
      paymentSelect: document.getElementById("paymentSelect"),
      saleDiscountInput: document.getElementById("saleDiscountInput"),
      notesInput: document.getElementById("notesInput"),
      finalizeButton: document.getElementById("finalizeButton"),
      clearCartButton: document.getElementById("clearCartButton"),
      productCount: document.getElementById("productCount"),
      productList: document.getElementById("productList"),
      unsentPill: document.getElementById("unsentPill"),
      unsentList: document.getElementById("unsentList"),
      retryUnsentButton: document.getElementById("retryUnsentButton"),
      sentPill: document.getElementById("sentPill"),
      sentList: document.getElementById("sentList"),
      githubStatus: document.getElementById("githubStatus"),
      githubTokenInput: document.getElementById("githubTokenInput"),
      githubRepoInput: document.getElementById("githubRepoInput"),
      githubBranchInput: document.getElementById("githubBranchInput"),
      githubFolderInput: document.getElementById("githubFolderInput"),
      saveGithubButton: document.getElementById("saveGithubButton"),
      clearGithubButton: document.getElementById("clearGithubButton"),
      exportBackupButton: document.getElementById("exportBackupButton"),
      toast: document.getElementById("toast")
    };

    function money(value) {
      return new Intl.NumberFormat("es-AR", {
        style: "currency",
        currency: "ARS",
        maximumFractionDigits: 0
      }).format(Number(value || 0));
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 2800);
    }

    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function productLabel(product) {
      return [product.producto, product.color, product.talle].filter(Boolean).join(" / ") + ` (${product.sku})`;
    }

    function allProducts() {
      return state.stock?.productos || [];
    }

    function selectedProduct() {
      const sku = els.productSelect.value;
      return state.filteredProducts.find((product) => product.sku === sku)
        || allProducts().find((product) => product.sku === sku);
    }

    function saleItems(sale) {
      if (Array.isArray(sale.items)) return sale.items;
      return [{
        sku: sale.sku,
        product_label: sale.product_label,
        quantity: Number(sale.quantity || 0),
        unit_price: Number(sale.unit_price || 0),
        discount_amount: Number(sale.discount_amount || 0),
        line_total: Number(sale.net_amount || sale.line_total || 0)
      }];
    }

    function quantitiesFromItems(items) {
      const map = {};
      for (const item of items) {
        map[item.sku] = (map[item.sku] || 0) + Number(item.quantity || 0);
      }
      return map;
    }

    function subtractQuantities(target, source) {
      for (const [sku, qty] of Object.entries(source)) {
        target[sku] = (target[sku] || 0) - qty;
      }
    }

    function reservedQuantities() {
      const reserved = {};
      subtractQuantities(reserved, quantitiesFromItems(state.cart));
      for (const sale of state.unsentSales) {
        subtractQuantities(reserved, quantitiesFromItems(saleItems(sale)));
      }
      for (const sale of state.sentSales) {
        subtractQuantities(reserved, quantitiesFromItems(saleItems(sale)));
      }
      return reserved;
    }

    function availableForSku(sku) {
      const product = allProducts().find((entry) => entry.sku === sku);
      const official = Number(product?.stock_disponible || 0);
      const reserved = reservedQuantities()[sku] || 0;
      return Math.max(0, official + reserved);
    }

    function reconcileImportedSales() {
      const imported = new Set(state.stock?.ventas_mobile_importadas || []);
      if (!imported.size) return;
      const before = state.sentSales.length;
      state.sentSales = state.sentSales.filter((sale) => !imported.has(sale.mobile_sale_uid));
      if (state.sentSales.length !== before) {
        writeJson(SENT_KEY, state.sentSales);
      }
    }

    function renderStockStatus() {
      const generated = state.stock?.generado_en;
      if (!generated) {
        els.stockStatus.textContent = "Stock: sin descargar";
        return;
      }
      const date = new Date(generated);
      const formatted = Number.isNaN(date.getTime()) ? generated : date.toLocaleString("es-AR");
      els.stockStatus.textContent = `Stock actualizado: ${formatted}`;
    }

    function renderProducts() {
      const products = allProducts();
      const query = els.searchInput.value.trim().toLowerCase();
      state.filteredProducts = products.filter((product) => {
        const available = availableForSku(product.sku);
        const haystack = [product.sku, product.producto, product.color, product.talle]
          .filter(Boolean).join(" ").toLowerCase();
        return available > 0 && (!query || haystack.includes(query));
      });

      els.productSelect.innerHTML = "";
      for (const product of state.filteredProducts) {
        const option = document.createElement("option");
        option.value = product.sku;
        option.textContent = `${productLabel(product)} - disp. ${availableForSku(product.sku)}`;
        els.productSelect.append(option);
      }

      const enabled = state.filteredProducts.length > 0;
      els.addCartButton.disabled = !enabled;
      els.productSelect.disabled = !enabled;
      els.productCount.textContent = `${state.filteredProducts.length} disponibles`;

      if (!enabled) {
        els.productList.innerHTML = '<p class="empty">Sin productos disponibles.</p>';
        els.priceInput.value = "";
        return;
      }

      syncPriceFromProduct();
      els.productList.innerHTML = state.filteredProducts.slice(0, 14).map((product) => `
        <div class="line">
          <div class="line-main">
            <span class="line-title">${escapeHtml(productLabel(product))}</span>
            <span class="pill ok">${availableForSku(product.sku)}</span>
          </div>
          <span class="line-meta">${money(product.precio_sugerido)} sugerido</span>
        </div>
      `).join("");
    }

    function syncPriceFromProduct() {
      const product = selectedProduct();
      if (!product) return;
      els.priceInput.value = Number(product.precio_sugerido || 0);
      els.quantityInput.max = Math.max(1, availableForSku(product.sku));
    }

    function renderCart() {
      const total = state.cart.reduce((sum, item) => sum + Number(item.line_total || 0), 0);
      els.cartPill.textContent = state.cart.length ? `${state.cart.length} en carrito` : "Carrito vacío";
      els.cartAmount.textContent = money(total - Number(els.saleDiscountInput.value || 0));
      els.finalizeButton.disabled = state.cart.length === 0;
      els.clearCartButton.disabled = state.cart.length === 0;

      if (!state.cart.length) {
        els.cartList.innerHTML = '<p class="empty">Todavía no hay prendas en el carrito.</p>';
        return;
      }

      els.cartList.innerHTML = state.cart.map((item, index) => `
        <div class="line">
          <div class="line-main">
            <span class="line-title">${escapeHtml(item.product_label)}</span>
            <span class="pill">${money(item.line_total)}</span>
          </div>
          <span class="line-meta">${item.quantity} u. · ${money(item.unit_price)} c/u</span>
          <div class="mini-actions">
            <button class="secondary" type="button" data-cart-remove="${index}">Quitar</button>
          </div>
        </div>
      `).join("");

      for (const button of els.cartList.querySelectorAll("[data-cart-remove]")) {
        button.addEventListener("click", () => removeCartItem(Number(button.dataset.cartRemove)));
      }
    }

    function renderSalesLists() {
      els.unsentPill.textContent = String(state.unsentSales.length);
      els.sentPill.textContent = String(state.sentSales.length);
      els.retryUnsentButton.disabled = state.unsentSales.length === 0;

      els.unsentList.innerHTML = state.unsentSales.length
        ? state.unsentSales.map((sale, index) => saleHtml(sale, index, true)).join("")
        : '<p class="empty">No hay ventas sin enviar.</p>';

      els.sentList.innerHTML = state.sentSales.length
        ? state.sentSales.map((sale) => saleHtml(sale, null, false)).join("")
        : '<p class="empty">No hay ventas enviadas esperando actualización de DuckDB.</p>';

      for (const button of els.unsentList.querySelectorAll("[data-unsent-remove]")) {
        button.addEventListener("click", () => removeUnsentSale(Number(button.dataset.unsentRemove)));
      }
    }

    function saleHtml(sale, index, removable) {
      const items = saleItems(sale);
      const itemText = items.map((item) => `${item.quantity} x ${item.product_label}`).join(" · ");
      const actions = removable
        ? `<div class="mini-actions"><button class="secondary" type="button" data-unsent-remove="${index}">Eliminar</button></div>`
        : "";
      return `
        <div class="line">
          <div class="line-main">
            <span class="line-title">${money(sale.net_amount)}</span>
            <span class="pill">${escapeHtml(sale.payment_method)}</span>
          </div>
          <span class="line-meta">${escapeHtml(itemText)}</span>
          <span class="line-meta">${new Date(sale.sale_at).toLocaleString("es-AR")} · ${escapeHtml(sale.mobile_sale_uid)}</span>
          ${actions}
        </div>
      `;
    }

    function renderGithubStatus() {
      const config = readGithubConfig();
      if (config.token && config.repo) {
        els.githubStatus.textContent = "configurado";
        els.githubStatus.className = "pill ok";
      } else {
        els.githubStatus.textContent = "sin configurar";
        els.githubStatus.className = "pill warn";
      }
    }

    function renderAll() {
      reconcileImportedSales();
      renderStockStatus();
      renderProducts();
      renderCart();
      renderSalesLists();
      renderGithubStatus();
    }

    function addToCart() {
      const product = selectedProduct();
      if (!product) return;
      const quantity = Math.max(1, Number.parseInt(els.quantityInput.value || "1", 10));
      const unitPrice = Math.max(0, Number(els.priceInput.value || 0));
      const available = availableForSku(product.sku);
      if (quantity > available) {
        showToast(`Disponible: ${available}`);
        return;
      }

      const existing = state.cart.find((item) => item.sku === product.sku && Number(item.unit_price) === unitPrice);
      if (existing) {
        existing.quantity += quantity;
        existing.line_total = existing.quantity * Number(existing.unit_price);
      } else {
        state.cart.push({
          sku: product.sku,
          product_label: productLabel(product),
          quantity,
          unit_price: unitPrice,
          discount_amount: 0,
          line_total: quantity * unitPrice
        });
      }
      writeJson(CART_KEY, state.cart);
      els.quantityInput.value = "1";
      showToast("Agregado al carrito");
      renderAll();
    }

    function removeCartItem(index) {
      state.cart.splice(index, 1);
      writeJson(CART_KEY, state.cart);
      renderAll();
    }

    function clearCart() {
      if (!state.cart.length) return;
      if (!window.confirm("Vaciar carrito?")) return;
      state.cart = [];
      writeJson(CART_KEY, state.cart);
      renderAll();
    }

    function buildSaleFromCart() {
      const gross = state.cart.reduce((sum, item) => sum + Number(item.line_total || 0), 0);
      const discount = Math.max(0, Number(els.saleDiscountInput.value || 0));
      if (discount > gross) {
        throw new Error("El descuento supera el total");
      }
      return {
        mobile_sale_uid: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        sale_at: new Date().toISOString(),
        payment_method: els.paymentSelect.value,
        notes: els.notesInput.value.trim(),
        gross_amount: gross,
        discount_amount: discount,
        net_amount: gross - discount,
        stock_snapshot_generated_at: state.stock?.generado_en || null,
        items: state.cart.map((item) => ({ ...item }))
      };
    }

    async function finalizeSale() {
      if (!state.cart.length) return;
      let sale;
      try {
        sale = buildSaleFromCart();
      } catch (error) {
        showToast(error.message);
        return;
      }

      els.finalizeButton.disabled = true;
      els.finalizeButton.textContent = "Finalizando...";
      try {
        await uploadSalesToGithub([sale]);
        state.sentSales.push(sale);
        showToast("Compra enviada");
      } catch (error) {
        state.unsentSales.push(sale);
        showToast(`No se pudo enviar. Quedó guardada.`);
      } finally {
        state.cart = [];
        writeJson(CART_KEY, state.cart);
        writeJson(UNSENT_KEY, state.unsentSales);
        writeJson(SENT_KEY, state.sentSales);
        els.saleDiscountInput.value = "0";
        els.notesInput.value = "";
        els.finalizeButton.textContent = "Finalizar compra";
        renderAll();
      }
    }

    async function retryUnsent() {
      if (!state.unsentSales.length) return;
      els.retryUnsentButton.disabled = true;
      els.retryUnsentButton.textContent = "Enviando...";
      try {
        const sales = [...state.unsentSales];
        await uploadSalesToGithub(sales);
        state.sentSales.push(...sales);
        state.unsentSales = [];
        writeJson(UNSENT_KEY, state.unsentSales);
        writeJson(SENT_KEY, state.sentSales);
        showToast("Ventas enviadas");
      } catch (error) {
        showToast(`No se pudo enviar: ${error.message}`);
      } finally {
        els.retryUnsentButton.textContent = "Reintentar envío";
        renderAll();
      }
    }

    function removeUnsentSale(index) {
      if (!window.confirm("Eliminar esta venta no enviada?")) return;
      state.unsentSales.splice(index, 1);
      writeJson(UNSENT_KEY, state.unsentSales);
      renderAll();
    }

    async function refreshStock(silent = false) {
      els.syncStatus.textContent = "Actualizando stock...";
      try {
        const response = await fetch(`${STOCK_URL}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const stock = await response.json();
        if (!stock || !Array.isArray(stock.productos)) throw new Error("JSON invalido");
        state.stock = {
          version: stock.version || 1,
          generado_en: stock.generado_en || null,
          ventas_mobile_importadas: stock.ventas_mobile_importadas || [],
          productos: stock.productos
        };
        writeJson(STOCK_KEY, state.stock);
        els.syncStatus.textContent = "Stock online cargado";
        renderAll();
        if (!silent) showToast("Stock actualizado");
      } catch {
        state.stock = readJson(STOCK_KEY, state.stock);
        els.syncStatus.textContent = state.stock.generado_en ? "Usando ultimo stock guardado" : "Sin stock disponible";
        renderAll();
        if (!silent) showToast("No se pudo actualizar stock");
      }
    }

    function buildSalesPayload(sales) {
      return {
        version: 2,
        exported_at: new Date().toISOString(),
        source: "orilla_mobile_sales",
        sales
      };
    }

    function readGithubConfig() {
      return readJson(GITHUB_KEY, {
        token: "",
        repo: "quinteiromartin/orilla-ventas-inbox",
        branch: "main",
        folder: "ventas"
      });
    }

    function writeGithubConfig(config) {
      writeJson(GITHUB_KEY, config);
    }

    function loadGithubForm() {
      const config = readGithubConfig();
      els.githubTokenInput.value = config.token || "";
      els.githubRepoInput.value = config.repo || "quinteiromartin/orilla-ventas-inbox";
      els.githubBranchInput.value = config.branch || "main";
      els.githubFolderInput.value = config.folder || "ventas";
    }

    function currentGithubForm() {
      return {
        token: els.githubTokenInput.value.trim(),
        repo: els.githubRepoInput.value.trim(),
        branch: els.githubBranchInput.value.trim() || "main",
        folder: els.githubFolderInput.value.trim().replace(/^\/+|\/+$/g, "") || "ventas"
      };
    }

    function saveGithubConfig() {
      const config = currentGithubForm();
      if (!config.token || !config.repo) {
        showToast("Completar token y repo");
        return;
      }
      writeGithubConfig(config);
      renderGithubStatus();
      showToast("GitHub configurado");
    }

    function clearGithubConfig() {
      const ok = window.confirm("Quitar token de este dispositivo?");
      if (!ok) return;
      writeGithubConfig({
        token: "",
        repo: els.githubRepoInput.value.trim() || "quinteiromartin/orilla-ventas-inbox",
        branch: els.githubBranchInput.value.trim() || "main",
        folder: els.githubFolderInput.value.trim() || "ventas"
      });
      loadGithubForm();
      renderGithubStatus();
      showToast("Token quitado");
    }

    function utf8ToBase64(value) {
      const bytes = new TextEncoder().encode(value);
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary);
    }

    async function uploadSalesToGithub(sales) {
      const config = readGithubConfig();
      if (!config.token || !config.repo) {
        throw new Error("Configurar GitHub primero");
      }
      const payload = buildSalesPayload(sales);
      const stamp = new Date().toISOString().slice(0, 19).replace(/[-:T]/g, "");
      const random = crypto.randomUUID ? crypto.randomUUID().slice(0, 8) : String(Date.now()).slice(-8);
      const path = `${config.folder || "ventas"}/ventas_orilla_${stamp}_${random}.json`;
      const url = `https://api.github.com/repos/${config.repo}/contents/${encodeURIComponent(path).replaceAll("%2F", "/")}`;
      const response = await fetch(url, {
        method: "PUT",
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${config.token}`,
          "X-GitHub-Api-Version": "2022-11-28",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: `Agregar ventas mobile ${stamp}`,
          content: utf8ToBase64(JSON.stringify(payload, null, 2)),
          branch: config.branch || "main"
        })
      });
      if (!response.ok) {
        const details = await response.json().catch(() => ({}));
        throw new Error(details.message || `GitHub HTTP ${response.status}`);
      }
    }

    function exportBackup() {
      const sales = [...state.unsentSales, ...state.sentSales];
      if (!sales.length) {
        showToast("No hay ventas locales para respaldar");
        return;
      }
      const payload = buildSalesPayload(sales);
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 19).replace(/[-:T]/g, "");
      a.href = url;
      a.download = `respaldo_ventas_orilla_${stamp}.json`;
      document.body.append(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("Respaldo generado");
    }

    function migrateLegacySales() {
      const legacy = readJson(LEGACY_SALES_KEY, []);
      if (!Array.isArray(legacy) || legacy.length === 0) return;
      const converted = legacy.map((sale) => ({
        mobile_sale_uid: sale.mobile_sale_uid,
        sale_at: sale.sale_at,
        payment_method: sale.payment_method,
        notes: sale.notes || "",
        gross_amount: Number(sale.gross_amount || 0),
        discount_amount: Number(sale.discount_amount || 0),
        net_amount: Number(sale.net_amount || 0),
        stock_snapshot_generated_at: sale.stock_snapshot_generated_at || null,
        items: saleItems(sale)
      }));
      state.unsentSales.push(...converted);
      writeJson(UNSENT_KEY, state.unsentSales);
      localStorage.removeItem(LEGACY_SALES_KEY);
    }

    function boot() {
      state.stock = readJson(STOCK_KEY, state.stock);
      state.cart = readJson(CART_KEY, []);
      state.unsentSales = readJson(UNSENT_KEY, []);
      state.sentSales = readJson(SENT_KEY, []);
      migrateLegacySales();
      loadGithubForm();
      renderAll();
      refreshStock(true);
    }

    els.searchInput.addEventListener("input", renderProducts);
    els.productSelect.addEventListener("change", syncPriceFromProduct);
    els.addCartButton.addEventListener("click", addToCart);
    els.refreshButton.addEventListener("click", () => refreshStock(false));
    els.saleDiscountInput.addEventListener("input", renderCart);
    els.finalizeButton.addEventListener("click", finalizeSale);
    els.clearCartButton.addEventListener("click", clearCart);
    els.retryUnsentButton.addEventListener("click", retryUnsent);
    els.saveGithubButton.addEventListener("click", saveGithubConfig);
    els.clearGithubButton.addEventListener("click", clearGithubConfig);
    els.exportBackupButton.addEventListener("click", exportBackup);

    boot();
  </script>
</body>
</html>
